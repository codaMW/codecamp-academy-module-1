<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strings JS Data Type</title>
</head>
<body>
    <main>
        <h1>Strings JS Data Type</h1>
    </main>
    <script>
        // Here start the JavaScript Code
        var name = "Cristian Camilo";
        var country = "Colombia";
        var gender = "Male";
        var grade = "Systems Engineer";
        var role = "Senior Full-stack Software Developer";
        var age = "28"; // String or Number?
        console.log(typeof(age)); // ?
        
        var greeting = "Hello!";
        var test = greeting * 3;
        console.log(test); // NaN

        var test2 = greeting + 3;
        console.log(test2); // Hello!3
        
        var h = "Hello ";
        var r = h + name;
        console.log(r); // Hello Cristian Camilo

        var favoriteFood = null;
        console.log(typeof(favoriteFood)); // ?
        var emptyExample = "";
        console.log(typeof(emptyExample)); // ? 
    </script>
</body>
</html>
